system_under_test:
    solution:
        submission_name: 'NVMe_Example'
        friendly_description: 'Single Drive Direct Attach NVMe'
        architecture:
            storage_location: local
            benchmark_API: file
            product_API: block
            client_footprint: open_source
            client_installation: in_box
        capabilities:
            multi_host: false
            simultaneous_write: false
            simultaneous_read: false
            remap_time_in_seconds: 30
    deployment: "onprem"
    clients:
        - friendly_description: Data
          quantity: 1
          chassis: 
             model_name: Supermicro 2U Hyper A+ Server (AS -2125HS-TNR)
             rack_units: 2
             cpu_model: AMD EPYC 9354 32-Core Processor
             cpu_qty: 2
             cpu_cores: 32
             memory_capacity: 256
             power:
                min_psus_active: 1
                psus_configured:
                    - nameplate_power_watts: 1600
                      inlet_voltage: 120
                      efficiency: Platinum
                      unit_count: 2
          networking:
             - unit_count: 1
               type: ethernet
               speed: 1
               traffic:
                  - management
          drives:
             - unit_count: 1
               vendor_name: Sandisk
               model_name: SN861
               interface: nvme
               capacity_in_GB: 15360
          operating_system:
             name: Ubuntu
             version: "24.04.2 LTS"
          environment:
             - name: 'MPI'
               value: 'Open MPI 4.1.7'
          sysctl:
             - name: 'vm.swappiness'
               value: '1'
    total_rack_units: 0
