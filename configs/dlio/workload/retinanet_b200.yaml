model:
  name: retinanet
  type: cnn

framework: pytorch

workflow:
  generate_data: False
  train: True
  checkpoint: False

dataset:
  data_folder: data/retinanet/
  format: jpeg
  num_files_train: 1170301
  num_samples_per_file: 1
  record_length_bytes: 322957

reader:
  data_loader: pytorch
  batch_size: 24
  read_threads: 8
  # Avoid spawn-context SemLock reap by systemd-logind RemoveIPC=yes. See #447.
  # DLIO auto-promotes fork->spawn for s3dlio / s3torchconnector.
  multiprocessing_context: fork
  file_shuffle: seed
  sample_shuffle: seed

train:
  epochs: 8
  computation_time: 0.04755

metric:
  au: 0.85
